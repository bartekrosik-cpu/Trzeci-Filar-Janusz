# Render Blueprint — strona statyczna (bez budowania)
# Dokumentacja: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: trzecifilar-nowa
    runtime: static
    # Repo zawiera gotowe pliki, więc nie ma kroku budowania:
    buildCommand: ""
    # Pliki leżą w katalogu głównym repo:
    staticPublishPath: .
    # Wymuszenie HTTPS i typowe nagłówki bezpieczeństwa
    # (rozwiązuje braki z audytu starej strony)
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
